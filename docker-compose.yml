services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - app

  mcp-local:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "agent_workflow.mcp.local_server:create_app", "--factory", "--host", "0.0.0.0", "--port", "8100"]
    ports:
      - "8100:8100"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8080
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://agent_workflow:agent_workflow@postgres:5432/agent_workflow
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      MCP_CONFIG_PATH: configs/mcp-servers.docker.yaml
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
      - redis
      - postgres
      - minio
      - mcp-local

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.qdrant:/qdrant/storage

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./.redis:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_workflow
      POSTGRES_USER: agent_workflow
      POSTGRES_PASSWORD: agent_workflow
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.minio:/data
